<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-servers: #1E1F22;
            --bg-sidebar: #2B2D31;
            --bg-chat: #313338;
            --bg-input: #383A40;
            --text-main: #DBDEE1;
            --text-muted: #949BA4;
            --accent: #5865F2;
            --accent-green: #23A55A;
            --accent-red: #ED4245;
            --hover: #3C3F45;
            --border: rgba(255, 255, 255, 0.08);
            --scroll: #1E1F22;
            --scroll-thumb: #3C3F45;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", sans-serif;
            background: #0B0C10;
            color: var(--text-main);
        }

        body::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        body::-webkit-scrollbar-track {
            background: var(--scroll);
        }

        body::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 999px;
        }

        .discord {
            display: grid;
            grid-template-columns: 72px 240px minmax(0, 1fr);
            min-height: 100vh;
            gap: 16px;
            padding: 16px;
        }

        .panel {
            background: var(--bg-sidebar);
            border-radius: 24px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .servers {
            background: var(--bg-servers);
            width: 72px;
            align-items: center;
            padding: 12px 0;
        }

        .server-icon,
        .server-action {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #36383F;
            color: var(--text-main);
            display: grid;
            place-items: center;
            margin: 8px 0;
            cursor: pointer;
            transition: background 0.2s ease, border-radius 0.2s ease, transform 0.2s ease;
            position: relative;
        }

        .server-icon:hover,
        .server-action:hover {
            background: #41444C;
            border-radius: 16px;
            transform: translateY(-2px);
        }

        .server-icon.active {
            background: #36383F;
            border-left: 4px solid var(--accent);
            border-radius: 16px;
        }

        .server-icon.active::before {
            content: "";
            position: absolute;
            left: -6px;
            top: 12px;
            width: 4px;
            height: 24px;
            background: var(--accent);
            border-top-right-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        .discord-icon {
            width: 48px;
            height: 48px;
            background: #5865F2;
            border-radius: 50%;
            display: grid;
            place-items: center;
            position: relative;
            margin-bottom: 8px;
        }

        .discord-icon::after {
            content: "";
            position: absolute;
            right: 8px;
            top: 8px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 0 2px rgba(35, 165, 90, 0.15);
        }

        .channels {
            background: var(--bg-sidebar);
            gap: 18px;
            padding: 20px 16px;
            min-height: 0;
        }

        .channel-header,
        .chat-header,
        .channel-search {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .channel-title {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 12px;
            color: var(--text-main);
            font-weight: 700;
            font-size: 15px;
            background: transparent;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .channel-title:hover {
            background: var(--hover);
        }

        .channel-title span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .settings-btn {
            padding: 8px;
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .settings-btn:hover {
            background: var(--hover);
            color: var(--text-main);
        }

        .create-chat-btn {
            padding: 8px;
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .create-chat-btn:hover {
            background: var(--hover);
            color: var(--text-main);
        }

        .channel-search {
            padding: 10px 12px;
            background: var(--bg-servers);
            border-radius: 12px;
        }

        .channel-search input {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text-main);
            outline: none;
            font-size: 14px;
        }

        .channel-search i {
            color: var(--text-muted);
            margin-right: 8px;
        }

        .section-label {
            margin: 12px 0 8px;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .channel-list,
        .messages {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            min-height: 0;
        }

        .channel-list::-webkit-scrollbar,
        .messages::-webkit-scrollbar,
        .chat-panel::-webkit-scrollbar {
            width: 8px;
        }

        .channel-list::-webkit-scrollbar-track,
        .messages::-webkit-scrollbar-track,
        .chat-panel::-webkit-scrollbar-track {
            background: var(--scroll);
        }

        .channel-list::-webkit-scrollbar-thumb,
        .messages::-webkit-scrollbar-thumb,
        .chat-panel::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 999px;
        }

        .channel-item,
        .message-action {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
            background: transparent;
            border: none;
            text-align: left;
        }

        .channel-item:hover,
        .message-action:hover {
            background: var(--hover);
        }

        .channel-item.active {
            background: #404249;
        }

        .channel-item i {
            width: 18px;
            text-align: center;
            color: var(--text-muted);
        }

        .channel-item .channel-meta {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
            width: 100%;
        }

        .channel-meta span:first-child {
            font-size: 14px;
        }

        .channel-meta span:last-child {
            color: var(--text-muted);
            font-size: 12px;
        }

        .voice-channel {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 10px 12px;
            border-radius: 12px;
            transition: background 0.2s ease;
            cursor: pointer;
        }

        .voice-channel:hover {
            background: var(--hover);
        }

        .voice-channel-top {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            font-size: 14px;
        }

        .voice-channel-bottom {
            color: var(--text-muted);
            font-size: 12px;
            margin-left: 28px;
        }

        .chat {
            background: var(--bg-chat);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            min-height: 0;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 18px;
        }

        .chat-title span {
            color: var(--text-muted);
            font-size: 13px;
        }

        .chat-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-actions i {
            width: 35px;
            height: 35px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            display: grid;
            place-items: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .chat-actions i:hover {
            background: var(--hover);
            color: var(--text-main);
        }

        .chat-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .status-avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: #40444B;
            display: grid;
            place-items: center;
            color: var(--text-main);
            position: relative;
            font-weight: 700;
        }

        .status-avatar i {
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-info {
            flex: 1;
        }

        .status-name {
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
        }

        .status-name:hover {
            text-decoration: underline;
        }

        .status-name-input {
            font-weight: 700;
            color: var(--text-main);
            background: var(--bg-input);
            border: 1px solid var(--accent);
            border-radius: 4px;
            padding: 2px 4px;
            font-size: inherit;
            outline: none;
        }

        .status-code {
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-avatar::after {
            content: "";
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #2E2F33;
            border: 2px solid var(--bg-chat);
            display: grid;
            place-items: center;
        }

        .status-avatar::before {
            content: "";
            position: absolute;
            bottom: 0;
            right: 0;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        .messages-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 18px;
            overflow-y: auto;
            min-height: 0;
            padding-right: 4px;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: var(--scroll);
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 999px;
        }

        .show-more {
            align-self: center;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .show-more:hover {
            background: var(--hover);
            color: var(--text-main);
        }

        .message-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 700;
            flex-shrink: 0;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .message-author {
            font-weight: 700;
            color: #FFFFFF;
            font-size: 14px;
        }

        .message-time {
            color: var(--text-muted);
            font-size: 12px;
        }

        .message-text {
            color: var(--text-main);
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .new-messages {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 12px;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        .new-messages::before,
        .new-messages::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .attachment {
            background: #2D2F33;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            width: 100%;
        }

        .attachment-content {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .attachment-image {
            width: 100%;
            height: 180px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            display: grid;
            place-items: center;
            color: var(--text-muted);
            font-size: 24px;
        }

        .chat-footer {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .input-bar {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 20px;
            height: 56px;
            display: grid;
            grid-template-columns: auto auto auto auto auto auto 1fr auto auto auto;
            align-items: center;
            gap: 10px;
            padding: 0 12px;
        }

        .input-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            overflow: hidden;
        }

        .input-bar i {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .input-bar i:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text-main);
        }

        .input-bar input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-main);
            font-size: 14px;
        }

        .input-bar input::placeholder {
            color: var(--text-muted);
        }

        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-form {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 400px;
            max-width: 90vw;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
        }

        .login-input {
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        .login-input:focus {
            border-color: var(--accent);
        }

        .login-btn {
            background: var(--accent);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .login-btn:hover {
            background: #4752d8;
        }

        .call-menu {
            position: absolute;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .call-option {
            padding: 10px 12px;
            border-radius: 8px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .call-option:hover {
            background: var(--hover);
        }

        .user-search {
            position: absolute;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            max-height: 200px;
            overflow-y: auto;
        }

        .user-result {
            padding: 10px 12px;
            border-radius: 8px;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-result:hover {
            background: var(--hover);
        }

        .user-result .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
        }

        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .settings-content {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            width: 400px;
            max-width: 90vw;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .settings-header h3 {
            margin: 0;
            color: var(--text-main);
        }

        .close-settings {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-settings:hover {
            color: var(--text-main);
        }

        .settings-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-item label {
            min-width: 100px;
            color: var(--text-main);
        }

        .setting-item input, .setting-item select, .setting-item button {
            flex: 1;
        }

        .profile-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2100;
        }

        .profile-content {
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            width: 400px;
            max-width: 90vw;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .profile-header h3 {
            margin: 0;
            color: var(--text-main);
        }

        .close-profile {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-profile:hover {
            color: var(--text-main);
        }

        .profile-body {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .profile-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-item label {
            min-width: 60px;
            color: var(--text-main);
            font-weight: 600;
        }

        .profile-item span {
            flex: 1;
            color: var(--text-muted);
        }

        .profile-item button {
            padding: 4px 8px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .profile-item button:hover {
            background: var(--accent-hover, #5865F2);
        }

        @media (max-width: 768px) {
            .discord {
                grid-template-columns: 72px minmax(0, 1fr);
            }

            .channels {
                display: none;
            }
        }

        @media (max-width: 500px) {
            .discord {
                grid-template-columns: 72px minmax(0, 1fr);
            }

            .channels {
                display: none;
            }
        }
    </style>
</head>
<body>
<div id="loginScreen" class="login-screen">
    <form class="login-form" id="loginForm">
        <div class="login-title">Войти в Камень</div>
        <input type="text" class="login-input" id="nickInput" placeholder="Введите ваш никнейм" required>
        <button type="submit" class="login-btn">Войти</button>
    </form>
</div>

<div class="discord" id="mainApp" style="display:grid;">
    <aside class="servers panel">
        <div class="discord-icon"><i class="fab fa-discord"></i></div>
        <button class="server-icon active">К</button>
        <div style="flex:1"></div>
        <button class="server-action"><i class="fas fa-plus"></i></button>
        <button class="server-action"><i class="fas fa-compass"></i></button>
    </aside>

    <aside class="channels panel">
        <div class="channel-header">
            <button class="channel-title"><span>Камень <i class="fas fa-chevron-down"></i></span></button>
            <button class="create-chat-btn" id="createChatBtn" title="Создать чат"><i class="fas fa-plus"></i></button>
        </div>
        <div class="channel-search">
            <i class="fas fa-magnifying-glass"></i>
            <input type="text" id="userSearch" placeholder="ID пользователя для звонка">
        </div>

        <div class="section-label">Каналы</div>
        <div class="channel-list">
            <button class="channel-item active"><i class="fas fa-hashtag"></i><span>#общий</span></button>
        </div>

        <div class="section-label">Голосовые каналы</div>
        <div class="voice-channel" id="voiceChannel">
            <div class="voice-channel-top"><i class="fas fa-volume-high"></i><span>🔊 Голосовой чат</span></div>
            <div class="voice-channel-bottom" id="voiceUsers">Подключено: 0</div>
        </div>
    </aside>

    <main class="chat panel">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-title"><i class="fas fa-hashtag"></i><span>#общий</span></div>
                <div class="chat-meta">Канал открыт</div>
            </div>
            <div class="chat-actions">
                <i class="fas fa-phone" id="callBtn" title="Позвонить другу"></i>
                <i class="fas fa-thumbtack" title="Прикрепить"></i>
                <i class="fas fa-user-friends" title="Участники"></i>
                <i class="fas fa-bell" title="Уведомления"></i>
                <i class="fas fa-thumbtack" title="Закреплённое сообщение"></i>
            </div>
        </div>

        <div class="chat-status">
            <div class="status-avatar" id="userAvatar">?</div>
            <div class="status-info">
                <div class="status-name" id="userName">Пользователь</div>
                <div class="status-code" id="userCode">Код: ...</div>
            </div>
            <div class="chat-meta" id="userStatus">Не в голосовом</div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="message-item system">
                <div class="message-content">
                    <div class="message-text">Добро пожаловать в Камень! Введите сообщение ниже.</div>
                </div>
            </div>
        </div>

        <div class="chat-footer">
            <div class="input-bar">
                <div class="input-avatar" id="inputAvatar"></div>
                <i class="fas fa-plus"></i>
                <i class="fas fa-gift"></i>
                <i class="fas fa-file-image" id="fileBtn"></i>
                <i class="fas fa-face-smile"></i>
                <i class="fas fa-microphone" id="micBtn" title="Микрофон"></i>
                <input type="text" id="messageInput" placeholder="Сообщение #общий">
                <i class="fas fa-microphone" id="voiceBtn" title="Голосовой звонок"></i>
                <i class="fas fa-headphones" id="headphonesBtn" title="Наушники"></i>
                <i class="fas fa-cog" id="settingsBtn" title="Настройки"></i>
            </div>
        </div>
    </main>
</div>

<div class="call-menu" id="callMenu">
    <button class="call-option" id="joinVoice">Присоединиться к голосовому</button>
    <button class="call-option" id="leaveVoice">Покинуть голосовой</button>
</div>

<div class="user-search" id="userSearchResults"></div>

<div class="profile-modal" id="profileModal">
    <div class="profile-content">
        <div class="profile-header">
            <h3>Профиль</h3>
            <button class="close-profile" id="closeProfile">&times;</button>
        </div>
        <div class="profile-body">
            <div class="profile-avatar-section">
                <div class="profile-avatar" id="profileAvatar"></div>
                <button id="changeAvatarBtn">Изменить аватар</button>
            </div>
            <div class="profile-info">
                <div class="profile-item">
                    <label>Ник:</label>
                    <span id="profileNick"></span>
                </div>
                <div class="profile-item">
                    <label>Код:</label>
                    <span id="profileCode"></span>
                    <button id="copyCodeBtn">Копировать</button>
                </div>
                <div class="profile-item">
                    <button id="callFriendBtn">Звонить другу</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="settings-modal" id="settingsModal">
    <div class="settings-content">
        <div class="settings-header">
            <h3>Настройки пользователя</h3>
            <button class="close-settings" id="closeSettings">&times;</button>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <label>Микрофон:</label>
                <button id="micTestBtn">Тест микрофона</button>
                <span id="micStatus">Не протестирован</span>
            </div>
            <div class="setting-item">
                <label>Громкость:</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50">
            </div>
        </div>
    </div>
</div>

<script>
    let myNick = '';
    let myId = '';
    let peer = null;
    let localStream = null;
    let currentCall = null;
    let isInVoice = false;
    let micEnabled = true;
    let connectedUsers = new Map();

    const loginScreen = document.getElementById('loginScreen');
    const mainApp = document.getElementById('mainApp');
    const loginForm = document.getElementById('loginForm');
    const nickInput = document.getElementById('nickInput');
    const userAvatar = document.getElementById('userAvatar');
    const userStatus = document.getElementById('userStatus');
    const userName = document.getElementById('userName');
    const userCode = document.getElementById('userCode');
    const inputAvatar = document.getElementById('inputAvatar');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const userSearch = document.getElementById('userSearch');
    const userSearchResults = document.getElementById('userSearchResults');
    const voiceChannel = document.getElementById('voiceChannel');
    const voiceUsers = document.getElementById('voiceUsers');
    const callMenu = document.getElementById('callMenu');
    const joinVoiceBtn = document.getElementById('joinVoice');
    const leaveVoiceBtn = document.getElementById('leaveVoice');
    const micBtn = document.getElementById('micBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettings = document.getElementById('closeSettings');
    const micTestBtn = document.getElementById('micTestBtn');
    const micStatus = document.getElementById('micStatus');
    const volumeSlider = document.getElementById('volumeSlider');
    const fileBtn = document.getElementById('fileBtn');
    const profileModal = document.getElementById('profileModal');
    const closeProfile = document.getElementById('closeProfile');
    const profileAvatar = document.getElementById('profileAvatar');
    const changeAvatarBtn = document.getElementById('changeAvatarBtn');
    const profileNick = document.getElementById('profileNick');
    const profileCode = document.getElementById('profileCode');
    const copyCodeBtn = document.getElementById('copyCodeBtn');
    const callFriendBtn = document.getElementById('callFriendBtn');
    const callBtn = document.getElementById('callBtn');
    const createChatBtn = document.getElementById('createChatBtn');

    // Prefill nickname from localStorage based on IP
    (async () => {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            const savedNick = localStorage.getItem('nick_' + data.ip);
            if (savedNick) {
                nickInput.value = savedNick;
                // Load avatar
                const savedAvatar = localStorage.getItem('avatar_' + savedNick);
                if (savedAvatar) {
                    userAvatar.innerHTML = `<img src="${savedAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                    inputAvatar.innerHTML = `<img src="${savedAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                } else {
                    inputAvatar.textContent = savedNick.charAt(0).toUpperCase();
                }
            }
        } catch (e) {
            console.log('Failed to prefill nickname:', e);
        }
    })();

    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        myNick = nickInput.value.trim();
        console.log('Введён ник:', myNick);
        if (myNick) {
            console.log('Скрываем экран входа');
            loginScreen.style.display = 'none';
            userName.textContent = myNick;
            userAvatar.textContent = myNick.charAt(0).toUpperCase();
            inputAvatar.textContent = myNick.charAt(0).toUpperCase();
            // Load avatar
            const savedAvatar = localStorage.getItem('avatar_' + myNick);
            if (savedAvatar) {
                userAvatar.innerHTML = `<img src="${savedAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                inputAvatar.innerHTML = `<img src="${savedAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
            }
            console.log('Инициализируем Peer');
            initPeer();
        } else {
            console.log('Ник пустой');
        }
    });

    function initPeer() {
        console.log('Начинаем инициализацию Peer');
        try {
            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    const hash = data.ip.split('').reduce((a, b) => ((a << 5) - a + b.charCodeAt(0)) | 0, 0);
                    myId = Math.abs(hash).toString(36).substring(0, 8).toUpperCase();
                    localStorage.setItem('nick_' + data.ip, myNick);
                    console.log('Получен ID:', myId);
                    peer = new Peer(myId, { host: '0.peerjs.com', port: 443, secure: true, path: '/', debug: 0 });
                    peer.on('open', () => {
                        console.log('Peer открыт');
                        addSystemMessage(`Подключено как ${myNick} (${myId})`);
                        userCode.textContent = 'Код: ' + myNick + '_' + myId;
                        startMicrophone();
                    });
                    peer.on('call', handleIncomingCall);
                })
                .catch((err) => {
                    console.log('Ошибка получения IP, используем случайный ID:', err);
                    myId = Math.random().toString(36).substring(2, 10).toUpperCase();
                    peer = new Peer(myId, { host: '0.peerjs.com', port: 443, secure: true, path: '/', debug: 0 });
                    peer.on('open', () => {
                        console.log('Peer открыт с случайным ID');
                        addSystemMessage(`Подключено как ${myNick} (${myId})`);
                        userCode.textContent = 'Код: ' + myNick + '_' + myId;
                        startMicrophone();
                    });
                    peer.on('call', handleIncomingCall);
                });
        } catch (err) {
            console.log('Ошибка инициализации Peer:', err);
            addSystemMessage('Ошибка подключения к сети');
        }
    }

    async function startMicrophone() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            updateMicButton(true);
        } catch (e) {
            addSystemMessage('Микрофон недоступен');
        }
    }

    function toggleMic() {
        if (!localStream) {
            startMicrophone();
            return;
        }
        localStream.getAudioTracks().forEach(track => track.enabled = !micEnabled);
        micEnabled = !micEnabled;
        updateMicButton(micEnabled);
    }

    function handleIncomingCall(call) {
        if (confirm('Входящий звонок от ' + call.peer + '. Принять?')) {
            call.answer(localStream);
            currentCall = call;
            isInVoice = true;
            updateVoiceStatus();
            connectedUsers.set(call.peer, call.peer); // добавить звонящего
            updateVoiceUsers();
            call.on('stream', (remoteStream) => {
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play();
            });
        } else {
            call.close();
        }
    }

    function joinVoiceChannel() {
        if (!isInVoice && localStream) {
            isInVoice = true;
            updateVoiceStatus();
            connectedUsers.set(myId, myNick);
            updateVoiceUsers();
        }
    }

    function leaveVoiceChannel() {
        if (isInVoice) {
            isInVoice = false;
            updateVoiceStatus();
            connectedUsers.clear();
            updateVoiceUsers();

            if (currentCall) {
                currentCall.close();
                currentCall = null;
            }
        }
    }

    function updateVoiceStatus() {
        userStatus.textContent = isInVoice ? 'В голосовом' : 'Не в голосовом';
        voiceUsers.textContent = `Подключено: ${connectedUsers.size}`;
    }

    function updateVoiceUsers() {
        voiceUsers.textContent = `Подключено: ${connectedUsers.size}`;
    }

    function addMessage(nick, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message-item';
        const avatarHtml = nick === myNick ? userAvatar.innerHTML : `<div style="background:#${Math.floor(Math.random()*16777215).toString(16)}">${nick.charAt(0).toUpperCase()}</div>`;
        messageDiv.innerHTML = `
            <div class="message-avatar">${avatarHtml}</div>
            <div class="message-content">
                <div class="message-meta">
                    <span class="message-author">${nick}</span>
                    <span class="message-time">${new Date().toLocaleTimeString()}</span>
                </div>
                <div class="message-text">${text}</div>
            </div>
        `;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addSystemMessage(text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message-item system';
        messageDiv.innerHTML = `
            <div class="message-content">
                <div class="message-text">${text}</div>
            </div>
        `;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && messageInput.value.trim()) {
            addMessage(myNick, messageInput.value.trim());
            messageInput.value = '';
        }
    });

    userSearch.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        if (query.length > 0) {
            userSearchResults.innerHTML = '';
            const id = query.includes('_') ? query.split('_').pop() : query;
            const displayName = query.includes('_') ? query : id;
            const resultDiv = document.createElement('button');
            resultDiv.className = 'user-result';
            resultDiv.innerHTML = `
                <span class="status-dot"></span>
                <span>Позвонить ${displayName}</span>
            `;
            resultDiv.addEventListener('click', () => {
                if (localStream) {
                    const call = peer.call(id, localStream);
                    currentCall = call;
                    addSystemMessage(`Звонок ${displayName}...`);
                    // Добавить в connectedUsers
                    connectedUsers.set(id, displayName);
                    updateVoiceUsers();
                }
                userSearchResults.style.display = 'none';
            });
            userSearchResults.appendChild(resultDiv);
            userSearchResults.style.display = 'flex';
        } else {
            userSearchResults.style.display = 'none';
        }
    });

    voiceChannel.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        callMenu.style.display = 'flex';
        callMenu.style.left = e.pageX + 'px';
        callMenu.style.top = e.pageY + 'px';
    });

    document.addEventListener('click', () => {
        callMenu.style.display = 'none';
        userSearchResults.style.display = 'none';
    });

    joinVoiceBtn.addEventListener('click', () => {
        joinVoiceChannel();
    });
    leaveVoiceBtn.addEventListener('click', () => {
        leaveVoiceChannel();
    });
    micBtn.addEventListener('click', () => {
        toggleMic();
    });
    voiceBtn.addEventListener('click', () => {
        if (isInVoice) {
            leaveVoiceChannel();
        } else {
            joinVoiceChannel();
        }
    });

    fileBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    addMessage(myNick, `<img src="${event.target.result}" style="max-width:200px;">`);
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    });

    // Server icons
    document.querySelectorAll('.server-icon').forEach(btn => {
        btn.addEventListener('click', () => {
            // Switch active
            document.querySelectorAll('.server-icon').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    // Channel title
    document.querySelector('.channel-title').addEventListener('click', () => {
        // Perhaps toggle something, for now just beep
    });

    // Settings
    settingsBtn.addEventListener('click', () => {
        settingsModal.style.display = 'flex';
    });

    closeSettings.addEventListener('click', () => {
        settingsModal.style.display = 'none';
    });

    micTestBtn.addEventListener('click', async () => {
        try {
            const testStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            micStatus.textContent = 'Микрофон работает';
            micStatus.style.color = 'var(--accent-green)';
            testStream.getTracks().forEach(track => track.stop());
        } catch (e) {
            micStatus.textContent = 'Микрофон недоступен';
            micStatus.style.color = 'var(--accent-red)';
        }
    });

    volumeSlider.addEventListener('input', (e) => {
        // For now, just log
        console.log('Volume:', e.target.value);
    });

    // Profile edit
    userName.addEventListener('click', () => {
        const currentNick = userName.textContent;
        const input = document.createElement('input');
        input.type = 'text';
        input.value = currentNick;
        input.className = 'status-name-input';
        userName.replaceWith(input);
        input.focus();
        input.select();

        const saveNick = async () => {
            const newNick = input.value.trim();
            if (newNick && newNick !== myNick) {
                myNick = newNick;
                userName.textContent = myNick;
                userAvatar.textContent = myNick.charAt(0).toUpperCase();
                inputAvatar.textContent = myNick.charAt(0).toUpperCase();
                userCode.textContent = 'Код: ' + myNick + '_' + myId;
                profileNick.textContent = myNick;
                input.replaceWith(userName);
                // Update localStorage
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    localStorage.setItem('nick_' + data.ip, myNick);
                } catch (e) {}
                addSystemMessage('Ник изменён на ' + myNick);
            } else {
                input.replaceWith(userName);
            }
        };

        input.addEventListener('blur', saveNick);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                saveNick();
            } else if (e.key === 'Escape') {
                input.replaceWith(userName);
            }
        });
    });

    // Profile modal
    document.querySelector('.chat-status').addEventListener('click', (e) => {
        if (e.target !== userName) { // Don't open if clicking on name for edit
            profileAvatar.textContent = userAvatar.textContent;
            profileNick.textContent = myNick;
            profileCode.textContent = myNick + '_' + myId;
            profileModal.style.display = 'flex';
        }
    });

    closeProfile.addEventListener('click', () => {
        profileModal.style.display = 'none';
    });

    changeAvatarBtn.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    userAvatar.innerHTML = `<img src="${event.target.result}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                    inputAvatar.innerHTML = `<img src="${event.target.result}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                    profileAvatar.innerHTML = `<img src="${event.target.result}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                    // Save to localStorage
                    localStorage.setItem('avatar_' + myNick, event.target.result);
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    });

    copyCodeBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(myNick + '_' + myId).then(() => {
            addSystemMessage('Код скопирован в буфер обмена');
        });
    });

    callFriendBtn.addEventListener('click', () => {
        const friendCode = prompt('Введите код друга (Ник_ID):');
        if (friendCode) {
            const id = friendCode.includes('_') ? friendCode.split('_').pop() : friendCode;
            if (localStream) {
                const call = peer.call(id, localStream);
                currentCall = call;
                addSystemMessage(`Звонок ${friendCode}...`);
                connectedUsers.set(id, friendCode);
                updateVoiceUsers();
            }
        }
        profileModal.style.display = 'none';
    });

    callBtn.addEventListener('click', () => {
        const friendCode = prompt('Введите код друга (Ник_ID):');
        if (friendCode) {
            const id = friendCode.includes('_') ? friendCode.split('_').pop() : friendCode;
            if (localStream) {
                const call = peer.call(id, localStream);
                currentCall = call;
                addSystemMessage(`Звонок ${friendCode}...`);
                connectedUsers.set(id, friendCode);
                updateVoiceUsers();
            }
        }
    </script>
</body>
</html>
